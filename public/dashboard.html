<!DOCTYPE html>
<html lang="es-CL">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de Gestión · NexVoz</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect width='48' height='48' rx='14' fill='%234F46E5'/%3E%3Cg stroke='white' stroke-width='3' stroke-linecap='round'%3E%3Cline x1='13' y1='22' x2='13' y2='34'/%3E%3Cline x1='20' y1='16' x2='20' y2='40'/%3E%3Cline x1='27' y1='21' x2='27' y2='35'/%3E%3Cline x1='34' y1='13' x2='34' y2='43'/%3E%3Cline x1='41' y1='24' x2='41' y2='32'/%3E%3C/g%3E%3C/svg%3E" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 font-sans text-slate-800">
  <header class="bg-slate-900 text-white">
    <div class="max-w-5xl mx-auto px-5 py-4 flex items-center justify-between">
      <h1 class="font-extrabold text-lg">Panel de Gestión · <span class="text-indigo-400">NexVoz</span></h1>
      <div class="flex items-center gap-3 text-sm">
        <span id="estado" class="text-emerald-400">● En vivo</span>
        <button id="refrescar" class="rounded-full bg-slate-700 px-3 py-1.5 hover:bg-slate-600">Refrescar</button>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-5 py-8">
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-8">
      <div class="rounded-2xl bg-white p-5 shadow-sm"><p class="text-sm text-slate-500">Pedidos</p><p id="kpi-pedidos" class="text-3xl font-extrabold">0</p></div>
      <div class="rounded-2xl bg-white p-5 shadow-sm"><p class="text-sm text-slate-500">Citas</p><p id="kpi-citas" class="text-3xl font-extrabold">0</p></div>
      <div class="rounded-2xl bg-white p-5 shadow-sm"><p class="text-sm text-slate-500">Urgencias</p><p id="kpi-urgencias" class="text-3xl font-extrabold text-amber-500">0</p></div>
      <div class="rounded-2xl bg-white p-5 shadow-sm"><p class="text-sm text-slate-500">Ventas</p><p id="kpi-ventas" class="text-3xl font-extrabold text-emerald-600">$0</p></div>
    </div>

    <div class="flex gap-2 mb-5 flex-wrap" id="tabs">
      <button data-tab="pedidos" class="tab rounded-full px-4 py-2 text-sm font-semibold bg-slate-900 text-white">Pedidos</button>
      <button data-tab="citas" class="tab rounded-full px-4 py-2 text-sm font-semibold bg-white text-slate-600">Citas</button>
      <button data-tab="urgencias" class="tab rounded-full px-4 py-2 text-sm font-semibold bg-white text-slate-600">Urgencias</button>
      <button data-tab="leads" class="tab rounded-full px-4 py-2 text-sm font-semibold bg-white text-slate-600">Leads</button>
    </div>

    <div id="contenido" class="space-y-3"><p class="text-slate-400">Cargando…</p></div>
  </main>

  <script>
    const clp = (n) => '$' + Number(n || 0).toLocaleString('es-CL');
    const fechaCL = (f) => f ? new Date(f).toLocaleString('es-CL') : '';
    let DATOS = { pedidos: [], citas: [], urgencias: [], leads: [] };
    let tabActiva = 'pedidos';

    const tarjeta = (inner, borde) => `<div class="rounded-2xl bg-white p-5 shadow-sm border-l-4 ${borde}">${inner}</div>`;
    const vacio = (t) => `<p class="text-slate-400">${t}</p>`;

    const render = {
      pedidos: () => DATOS.pedidos.length ? DATOS.pedidos.map(p => tarjeta(`
        <div class="flex justify-between items-start"><div><p class="font-bold">${p.cliente_nombre || 'Sin nombre'} <span class="text-xs font-normal text-slate-400">${p.id}</span></p>
        <p class="text-sm text-slate-500">${p.cliente_telefono || ''} · ${p.tipo_entrega || ''} ${p.direccion ? '· ' + p.direccion : ''}</p></div>
        <span class="text-emerald-600 font-extrabold">${clp(p.total_clp)}</span></div>
        <ul class="mt-2 text-sm text-slate-600">${(p.items||[]).map(i=>`<li>• ${i.cantidad||1}x ${i.nombre}</li>`).join('')}</ul>
        <p class="mt-2 text-xs text-slate-400">${fechaCL(p.fecha)} · pago: ${p.forma_pago||'s/n'}</p>`, 'border-orange-400'))
        .join('') : vacio('No hay pedidos aún.'),

      citas: () => DATOS.citas.length ? DATOS.citas.map(c => tarjeta(`
        <p class="font-bold">${c.paciente_nombre || c.nombre || 'Sin nombre'} <span class="text-xs font-normal text-slate-400">${c.id}</span></p>
        <p class="text-sm text-slate-500">${c.servicio || ''} · ${c.profesional || 'cualquiera'}</p>
        <p class="text-sm text-slate-600 mt-1">${c.fecha || 's/f'} ${c.hora || ''} · ${c.paciente_telefono || c.telefono || ''}</p>
        <p class="mt-2 text-xs text-slate-400">${fechaCL(c.fecha)}</p>`, 'border-cyan-500'))
        .join('') : vacio('No hay citas aún.'),

      urgencias: () => DATOS.urgencias.length ? DATOS.urgencias.map(u => tarjeta(`
        <div class="flex justify-between items-start"><div><p class="font-bold">${u.cliente_nombre || u.nombre || 'Sin nombre'} <span class="text-xs font-normal text-slate-400">${u.id}</span></p>
        <p class="text-sm text-slate-500">${u.tipo_problema || u.tipo || ''} · ${u.comuna || ''}</p></div>
        <span class="text-xs font-bold px-2 py-1 rounded-full bg-amber-100 text-amber-700">${u.nivel_urgencia || u.urgencia || ''}</span></div>
        <p class="text-sm text-slate-600 mt-1">${u.cliente_telefono || u.telefono || ''}</p>
        <p class="mt-2 text-xs text-slate-400">${fechaCL(u.fecha)}</p>`, 'border-amber-500'))
        .join('') : vacio('No hay urgencias aún.'),

      leads: () => DATOS.leads.length ? DATOS.leads.map(l => tarjeta(`
        <p class="font-semibold">${l.nombre || 's/n'} — ${l.negocio || ''}</p>
        <p class="text-sm text-slate-500">${l.telefono || ''} · ${l.rubro || ''}</p>
        <p class="mt-2 text-xs text-slate-400">${fechaCL(l.fecha)}</p>`, 'border-indigo-500'))
        .join('') : vacio('Sin leads todavía.'),
    };

    function pintar() {
      document.getElementById('contenido').innerHTML = render[tabActiva]();
      document.querySelectorAll('.tab').forEach(b => {
        const activa = b.dataset.tab === tabActiva;
        b.className = `tab rounded-full px-4 py-2 text-sm font-semibold ${activa ? 'bg-slate-900 text-white' : 'bg-white text-slate-600'}`;
      });
    }

    async function cargar() {
      try {
        const r = await fetch('/api/data');
        DATOS = { pedidos: [], citas: [], urgencias: [], leads: [], ...(await r.json()) };
        document.getElementById('estado').textContent = '● En vivo';
        document.getElementById('estado').className = 'text-emerald-400';
        document.getElementById('kpi-pedidos').textContent = DATOS.pedidos.length;
        document.getElementById('kpi-citas').textContent = DATOS.citas.length;
        document.getElementById('kpi-urgencias').textContent = DATOS.urgencias.length;
        document.getElementById('kpi-ventas').textContent = clp(DATOS.pedidos.reduce((s,p)=>s+(p.total_clp||0),0));
        pintar();
      } catch {
        document.getElementById('estado').textContent = '● Sin conexión';
        document.getElementById('estado').className = 'text-red-400';
      }
    }

    document.getElementById('tabs').addEventListener('click', (e) => {
      const btn = e.target.closest('.tab');
      if (!btn) return;
      tabActiva = btn.dataset.tab;
      pintar();
    });
    document.getElementById('refrescar').addEventListener('click', cargar);
    cargar();
    setInterval(cargar, 8000);
  </script>
</body>
</html>
